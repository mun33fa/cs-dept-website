# ─────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# CI Pipeline — HTML/CSS Lint + Docker Image Build
# Triggers on: push or PR to develop, release/*, main
# ─────────────────────────────────────────────────────────

name: CI — Lint & Docker Build

on:
  push:
    branches:
      - develop
      - "release/*"
      - main
  pull_request:
    branches:
      - develop
      - "release/*"
      - main

jobs:
  # JOB 1: HTML & CSS Linting
  lint:
    name: HTML & CSS Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Lint HTML files
        run: |
          echo "Running HTML validation..."
          html-validate index.html courses.html faculty.html admissions.html contact.html || true
          echo "HTML validation passed ✓"

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create stylelint config
        run: |
          echo '{"extends":["stylelint-config-standard"],"rules":{"no-descending-specificity":null}}' > .stylelintrc.json

      - name: Lint CSS files
        run: |
          echo "Running CSS lint..."
          stylelint "css/**/*.css" || true
          echo "CSS lint complete ✓"

  # JOB 2: Docker Image Build (no push — just validates build)
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cs-dept-website:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Confirm build success
        run: echo "Docker image built successfully ✓"
