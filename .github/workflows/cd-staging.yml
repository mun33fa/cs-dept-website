# ─────────────────────────────────────────────────────────
# .github/workflows/cd-staging.yml
# CD Pipeline — Deploy to STAGING/QA environment on Render
# Triggers on: push to any 'release/*' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Staging/QA

on:
  push:
    branches:
      - "release/*"

environment: staging

jobs:
  deploy-staging:
    name: Deploy to Staging/QA (Render)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Log in to Docker Hub ───────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 2: Build & Push Docker image ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 3: Trigger Render Deploy Hook ─────────────
      - name: Trigger Render deploy (Staging)
        run: |
          echo "Triggering Render deployment for Staging/QA environment..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo ""
          echo "Deploy hook triggered ✓"

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Deployed to STAGING/QA environment"
          echo "  URL: ${{ secrets.RENDER_SITE_URL }}"
          echo "=========================================="
