# ─────────────────────────────────────────────────────────
# .github/workflows/cd-staging.yml
# CD Pipeline — Build & Push Docker image to Docker Hub
# Environment: Staging/QA
# Triggers on: push to 'release/*' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Staging

on:
  push:
    branches:
      - "release/*"

jobs:
  deploy-staging:
    name: Build & Push to Docker Hub (Staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Image pushed to Docker Hub"
          echo "  Tag: staging"
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:staging"
          echo "=========================================="
