# ─────────────────────────────────────────────────────────
# .github/workflows/cd-development.yml
# CD Pipeline — Deploy to DEVELOPMENT environment on Render
# Triggers on: push to 'develop' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Development

on:
  push:
    branches:
      - develop

# Use the 'development' GitHub Environment for secrets
environment: development

jobs:
  deploy-development:
    name: Deploy to Development (Render)
    runs-on: ubuntu-latest
    environment: development   # links this job to the GitHub Environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Log in to Docker Hub ───────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 2: Build & Push Docker image ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (development tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:development
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 3: Trigger Render Deploy Hook ─────────────
      - name: Trigger Render deploy (Development)
        run: |
          echo "Triggering Render deployment for Development environment..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo ""
          echo "Deploy hook triggered ✓"

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Deployed to DEVELOPMENT environment"
          echo "  URL: ${{ secrets.RENDER_SITE_URL }}"
          echo "=========================================="
