# ─────────────────────────────────────────────────────────
# .github/workflows/cd-development.yml
# CD Pipeline — Build & Push Docker image to Docker Hub
# Environment: Development
# Triggers on: push to 'develop' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Development

on:
  push:
    branches:
      - develop

jobs:
  deploy-development:
    name: Build & Push to Docker Hub (Development)
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (development tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:development
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Image pushed to Docker Hub"
          echo "  Tag: development"
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:development"
          echo "=========================================="
