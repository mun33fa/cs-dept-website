# ─────────────────────────────────────────────────────────
# .github/workflows/cd-production.yml
# CD Pipeline — Build & Push Docker image to Docker Hub
# Environment: Production
# Triggers on: push to 'main' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    name: Build & Push to Docker Hub (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (production + latest tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:production
            ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Image pushed to Docker Hub"
          echo "  Tags: production, latest"
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:production"
          echo "=========================================="
