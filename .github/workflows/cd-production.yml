# ─────────────────────────────────────────────────────────
# .github/workflows/cd-production.yml
# CD Pipeline — Deploy to PRODUCTION environment on Render
# Triggers on: push to 'main' branch
# ─────────────────────────────────────────────────────────

name: CD — Deploy to Production

on:
  push:
    branches:
      - main

environment: production

jobs:
  deploy-production:
    name: Deploy to Production (Render)
    runs-on: ubuntu-latest
    environment: production   # requires manual approval if protection rule set

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Log in to Docker Hub ───────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 2: Build & Push Docker image ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (latest / production tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cs-dept-website:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 3: Trigger Render Deploy Hook ─────────────
      - name: Trigger Render deploy (Production)
        run: |
          echo "Triggering Render deployment for Production environment..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo ""
          echo "Deploy hook triggered ✓"

      - name: Deployment complete
        run: |
          echo "=========================================="
          echo "  Deployed to PRODUCTION environment"
          echo "  URL: ${{ secrets.RENDER_SITE_URL }}"
          echo "=========================================="
